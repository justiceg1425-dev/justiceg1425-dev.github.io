<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Test Case Generator visual</title>
  <desc id="desc">A requirements document flowing into generated test cases and export targets.</desc>
  <rect width="1200" height="760" rx="36" fill="#071719"/>
  <rect x="52" y="54" width="1096" height="652" rx="28" fill="#F7FAFB"/>
  <text x="92" y="112" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="32" font-weight="850">LLM Test Case Generator</text>
  <text x="92" y="146" fill="#60747B" font-family="Inter,Segoe UI,sans-serif" font-size="18">BRDs and API specs into structured QA test cases</text>
  <g transform="translate(92 210)">
    <rect width="300" height="342" rx="18" fill="#FFFFFF" stroke="#D5E1E5"/>
    <rect x="24" y="24" width="72" height="86" rx="10" fill="#E8F7F5"/>
    <path d="M78 24V47H96" stroke="#18A999" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="24" y="146" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="20" font-weight="800">Requirements</text>
    <g fill="#9FB0B6">
      <rect x="24" y="178" width="214" height="12" rx="6"/>
      <rect x="24" y="204" width="252" height="12" rx="6"/>
      <rect x="24" y="230" width="188" height="12" rx="6"/>
      <rect x="24" y="256" width="232" height="12" rx="6"/>
    </g>
  </g>
  <g transform="translate(450 210)">
    <rect width="300" height="342" rx="18" fill="#0C403D"/>
    <text x="28" y="54" fill="#B9FFF6" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">Generation engine</text>
    <text x="28" y="94" fill="#FFFFFF" font-family="Inter,Segoe UI,sans-serif" font-size="38" font-weight="850">LLM + rules</text>
    <rect x="28" y="142" width="244" height="44" rx="10" fill="#18A999"/>
    <text x="48" y="171" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="800">Parse actors and flows</text>
    <rect x="28" y="204" width="244" height="44" rx="10" fill="#2FE2CF"/>
    <text x="48" y="233" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="800">Generate scenarios</text>
    <rect x="28" y="266" width="244" height="44" rx="10" fill="#FFFFFF"/>
    <text x="48" y="295" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="800">Version and export</text>
  </g>
  <g transform="translate(808 210)">
    <rect width="300" height="342" rx="18" fill="#FFFFFF" stroke="#D5E1E5"/>
    <text x="24" y="48" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="20" font-weight="800">Generated tests</text>
    <g transform="translate(24 78)">
      <rect width="252" height="58" rx="10" fill="#E8F7F5"/>
      <text x="16" y="24" fill="#0C403D" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="800">TC-001 Happy path</text>
      <text x="16" y="44" fill="#60747B" font-family="Inter,Segoe UI,sans-serif" font-size="12">Validate successful booking</text>
    </g>
    <g transform="translate(24 154)">
      <rect width="252" height="58" rx="10" fill="#FFF2D8"/>
      <text x="16" y="24" fill="#7B4C00" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="800">TC-002 Negative path</text>
      <text x="16" y="44" fill="#60747B" font-family="Inter,Segoe UI,sans-serif" font-size="12">Missing required field</text>
    </g>
    <g transform="translate(24 230)">
      <rect width="252" height="58" rx="10" fill="#E8EDFF"/>
      <text x="16" y="24" fill="#315FCE" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="800">Exports</text>
      <text x="16" y="44" fill="#60747B" font-family="Inter,Segoe UI,sans-serif" font-size="12">Excel, JSON, QMetry, Gherkin</text>
    </g>
  </g>
  <path d="M410 381H434" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
  <path d="M392 381H420" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
  <path d="M768 381H792" stroke="#18A999" stroke-width="8" stroke-linecap="round"/>
</svg>
