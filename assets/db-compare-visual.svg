<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DB Table Compare Pro visual</title>
  <desc id="desc">A visual comparison of two database tables with highlighted mismatches and AI summary.</desc>
  <rect width="1200" height="760" rx="36" fill="#0B1518"/>
  <rect x="48" y="48" width="1104" height="664" rx="24" fill="#F5F8F9"/>
  <rect x="88" y="92" width="1024" height="78" rx="14" fill="#FFFFFF" stroke="#D5E1E5"/>
