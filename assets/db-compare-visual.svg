    <text x="42" y="95" fill="#0C403D" font-family="Cascadia Code,Consolas,monospace" font-size="15">cust_id</text>
    <text x="184" y="95" fill="#0C403D" font-family="Cascadia Code,Consolas,monospace" font-size="15">total</text>
    <text x="294" y="95" fill="#0C403D" font-family="Cascadia Code,Consolas,monospace" font-size="15">state</text>
