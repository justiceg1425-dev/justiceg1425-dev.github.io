<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DB Table Compare Pro dashboard screenshot</title>
  <desc id="desc">A sanitized demo dashboard for comparing source and target database tables.</desc>
  <rect width="1440" height="900" fill="#F4F7F8"/>
  <rect x="0" y="0" width="250" height="900" fill="#0B171A"/>
  <rect x="28" y="28" width="50" height="50" rx="12" fill="#18A999"/>
  <text x="96" y="48" fill="white" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">DB Compare</text>
  <text x="96" y="70" fill="#99AEB4" font-family="Inter,Segoe UI,sans-serif" font-size="13">Table reconciliation</text>
  <g font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#DDF2F3">
    <rect x="24" y="124" width="202" height="42" rx="8" fill="#1B2C31"/>
    <text x="54" y="151">Connections</text>
    <text x="54" y="210">Mapping</text>
    <text x="54" y="260">Compare Options</text>
    <text x="54" y="310">Results</text>
    <text x="54" y="360">AI Summary</text>
  </g>
  <main>
    <text x="294" y="58" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="850">DB Table Compare Pro</text>
    <text x="294" y="84" fill="#60747B" font-family="Inter,Segoe UI,sans-serif" font-size="15">Sanitized demo data - no production credentials or records shown</text>
    <rect x="294" y="116" width="512" height="170" rx="14" fill="white" stroke="#D5E1E5"/>
    <text x="318" y="150" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">Source connection</text>
    <rect x="318" y="174" width="210" height="42" rx="8" fill="#F7FAFB" stroke="#D5E1E5"/>
    <text x="334" y="201" fill="#50676E" font-family="Inter,Segoe UI,sans-serif" font-size="14">Oracle</text>
    <rect x="544" y="174" width="238" height="42" rx="8" fill="#F7FAFB" stroke="#D5E1E5"/>
    <text x="560" y="201" fill="#50676E" font-family="Inter,Segoe UI,sans-serif" font-size="14">CUSTOMER_LEDGER_SRC</text>
    <rect x="318" y="232" width="134" height="34" rx="8" fill="#18A999"/>
    <text x="346" y="254" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="800">Connected</text>
    <rect x="830" y="116" width="512" height="170" rx="14" fill="white" stroke="#D5E1E5"/>
    <text x="854" y="150" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">Target connection</text>
    <rect x="854" y="174" width="210" height="42" rx="8" fill="#F7FAFB" stroke="#D5E1E5"/>
    <text x="870" y="201" fill="#50676E" font-family="Inter,Segoe UI,sans-serif" font-size="14">MySQL</text>
    <rect x="1080" y="174" width="238" height="42" rx="8" fill="#F7FAFB" stroke="#D5E1E5"/>
    <text x="1096" y="201" fill="#50676E" font-family="Inter,Segoe UI,sans-serif" font-size="14">customer_ledger_tgt</text>
    <rect x="854" y="232" width="134" height="34" rx="8" fill="#18A999"/>
    <text x="882" y="254" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="800">Connected</text>
    <rect x="294" y="314" width="1048" height="134" rx="14" fill="white" stroke="#D5E1E5"/>
    <text x="318" y="348" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">Comparison setup</text>
    <g font-family="Inter,Segoe UI,sans-serif" font-size="14">
      <rect x="318" y="372" width="176" height="44" rx="8" fill="#E8F7F5"/><text x="338" y="400" fill="#0C403D">Key: customer_id</text>
      <rect x="510" y="372" width="190" height="44" rx="8" fill="#E8F7F5"/><text x="530" y="400" fill="#0C403D">Rule: trim strings</text>
      <rect x="716" y="372" width="214" height="44" rx="8" fill="#FFF2D8"/><text x="736" y="400" fill="#704500">Tolerance: amount 0.01</text>
      <rect x="946" y="372" width="206" height="44" rx="8" fill="#E8EDFF"/><text x="966" y="400" fill="#315FCE">Batch: ordered seek</text>
      <rect x="1168" y="372" width="150" height="44" rx="8" fill="#0C403D"/><text x="1194" y="400" fill="#FFFFFF" font-weight="800">Run compare</text>
    </g>
    <rect x="294" y="476" width="1048" height="264" rx="14" fill="white" stroke="#D5E1E5"/>
    <text x="318" y="510" fill="#071719" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="800">Results</text>
    <g font-family="Inter,Segoe UI,sans-serif">
      <rect x="318" y="534" width="1000" height="44" rx="8" fill="#F0F6F7"/>
      <text x="344" y="562" fill="#0C403D" font-size="14" font-weight="800">customer_id</text>
      <text x="520" y="562" fill="#0C403D" font-size="14" font-weight="800">column</text>
      <text x="700" y="562" fill="#0C403D" font-size="14" font-weight="800">source</text>
      <text x="884" y="562" fill="#0C403D" font-size="14" font-weight="800">target</text>
      <text x="1080" y="562" fill="#0C403D" font-size="14" font-weight="800">status</text>
      <text x="344" y="620" fill="#273D44" font-size="14">C-1002</text><text x="520" y="620" fill="#273D44" font-size="14">amount</text><text x="700" y="620" fill="#273D44" font-size="14">119.50</text><text x="884" y="620" fill="#E15B55" font-size="14" font-weight="800">121.00</text><text x="1080" y="620" fill="#E15B55" font-size="14" font-weight="800">Mismatch</text>
      <text x="344" y="674" fill="#273D44" font-size="14">C-1004</text><text x="520" y="674" fill="#273D44" font-size="14">status</text><text x="700" y="674" fill="#273D44" font-size="14">HOLD</text><text x="884" y="674" fill="#B56A00" font-size="14" font-weight="800">BLOCKED</text><text x="1080" y="674" fill="#B56A00" font-size="14" font-weight="800">Review</text>
    </g>
    <rect x="294" y="768" width="1048" height="84" rx="14" fill="#0C403D"/>
    <text x="320" y="802" fill="#B9FFF6" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="800">AI mismatch summary</text>
    <text x="320" y="832" fill="#FFFFFF" font-family="Inter,Segoe UI,sans-serif" font-size="15">2 differences detected. Amount variance is above tolerance for C-1002. Status drift for C-1004 may indicate rule mapping or downstream enrichment.</text>
  </main>
</svg>
